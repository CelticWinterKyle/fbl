<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Biz Football</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #07080d;
      color: #f0ede6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e2030;
    }
    .logo {
      position: relative;
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-diamond {
      position: absolute;
      inset: 0;
      background: #f59e0b;
      transform: rotate(45deg);
      border-radius: 3px;
    }
    .logo-text {
      position: relative;
      font-size: 10px;
      font-weight: 900;
      color: #07080d;
      letter-spacing: 0.05em;
      z-index: 1;
    }
    .header-title {
      font-weight: 700;
      font-size: 13px;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .header-sub {
      font-size: 10px;
      color: #4e5370;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Body ── */
    .body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Status row ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-found { background: #10b981; }
    .dot-missing { background: #6b7280; }
    .dot-error { background: #ef4444; }
    .status-label {
      font-size: 12px;
      color: #9ca3af;
    }
    .status-label strong { color: #f0ede6; font-weight: 600; }

    /* ── League badge ── */
    .league-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f59e0b18;
      border: 1px solid #f59e0b40;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fbbf24;
      letter-spacing: 0.04em;
    }
    .league-badge-label {
      font-weight: 400;
      color: #78716c;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.1em;
    }

    /* ── Hint ── */
    .hint {
      font-size: 11px;
      color: #4e5370;
      line-height: 1.5;
    }
    .hint a {
      color: #f59e0b;
      text-decoration: none;
    }
    .hint a:hover { text-decoration: underline; }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: #1e2030;
    }

    /* ── Button ── */
    .btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      text-align: center;
    }
    .btn-primary {
      background: #f59e0b;
      color: #07080d;
    }
    .btn-primary:hover { background: #fbbf24; }
    .btn-primary:disabled {
      background: #1e2030;
      color: #4e5370;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid #1e2030;
      color: #9ca3af;
      font-size: 11px;
    }
    .btn-secondary:hover { border-color: #363a55; color: #f0ede6; }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1e2030;
      font-size: 10px;
      color: #363a55;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .footer a { color: #4e5370; text-decoration: none; }
    .footer a:hover { color: #9ca3af; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-diamond"></div>
      <span class="logo-text">FB</span>
    </div>
    <div>
      <div class="header-title">Family Biz Football</div>
      <div class="header-sub">ESPN Connect</div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- ESPN login status -->
    <div class="status-row">
      <div class="dot dot-missing" id="espn-dot"></div>
      <span class="status-label" id="espn-status">Checking ESPN...</span>
    </div>

    <!-- Detected league -->
    <div class="league-badge hidden" id="league-badge">
      <span class="league-badge-label">League</span>
      <span id="league-id-text">—</span>
    </div>

    <!-- Hint text -->
    <p class="hint hidden" id="hint"></p>

    <div class="divider"></div>

    <!-- Primary CTA -->
    <button class="btn btn-primary" id="connect-btn" disabled>
      Checking…
    </button>

    <!-- Open dashboard shortcut -->
    <button class="btn btn-secondary" id="dashboard-btn">
      Open Dashboard →
    </button>

  </div>

  <!-- Footer -->
  <div class="footer">
    <a href="https://familybizfootball.com" id="footer-link">familybizfootball.com</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
